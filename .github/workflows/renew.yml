name: Buster Renewer (Xray)

on:
  workflow_dispatch:
  schedule:
    - cron: '35 0,12 * * *'

jobs:
  run:
    runs-on: ubuntu-22.04
    timeout-minutes: 20

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/game4free-renew
          token: ${{ secrets.PRIVATE_REPO_TOKEN }} 
          path: private

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb wget unzip curl jq p7zip-full pulseaudio alsa-utils ffmpeg

          pulseaudio --start --exit-idle-time=-1 || true
          pactl load-module module-null-sink sink_name=virtual_speaker || true
          pactl set-default-sink virtual_speaker || true
          pactl load-module module-virtual-source source_name=virtual_mic || true
          pactl set-default-source virtual_mic || true

      - name: Install playwright
        working-directory: ./private
        run: |
          npm init -y
          npm install playwright
          npx playwright install chromium

      - name: Download Buster
        working-directory: ./private
        run: |
          mkdir -p extensions/buster
          wget -O extensions/buster/buster.zip \
            https://github.com/dessant/buster/releases/download/v3.1.0/buster_captcha_solver_for_humans-3.1.0-chrome.zip

      - name: Unzip Buster
        working-directory: ./private
        run: |
          mkdir -p extensions/buster/unpacked
          7z x -y extensions/buster/buster.zip -oextensions/buster/unpacked

      # =========================
      # 🟡 4️⃣ 部署并启动 Xray 前置代理 
      # =========================
      - name: Setup Xray
        env:
          XRAY_CONFIG_ENV: ${{ secrets.XRAY_CONFIG }}
        run: |
          echo "⬇️ 正在下载 Xray 核心..."
          wget -q -O xray.zip https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          mkdir -p xray
          unzip -q xray.zip -d xray
          
          echo "📝 正在写入节点配置..."
          # 关键修复：使用环境变量安全地写入多行 JSON
          echo "$XRAY_CONFIG_ENV" > xray/config.json
          
          echo "🚀 正在后台启动 Xray..."
          cd xray
          # 关键修复：加上 run 参数
          nohup ./xray run -c config.json > xray.log 2>&1 &
          cd ..
          
          echo "⏳ 等待 Xray 核心启动 (5秒)..."
          sleep 5

      # =========================
      # 🟡 5️⃣ 调试 IP (验证代理是否生效)
      # =========================
      - name: Check IP
        run: |
          echo "🌍 当前原生 IP:"
          curl -s https://api.ipify.org || echo "Failed"
          echo
          
          echo "🚀 测试 Xray HTTP 代理连接 (10808 mixed 端口):"
          if curl -x http://127.0.0.1:10808 https://api.ipify.org; then
            echo -e "\n✅ 代理连接成功！"
          else
            echo -e "\n❌ 代理未生效，下面是 Xray 启动日志："
            cat xray/xray.log
            exit 1
          fi
          
      - name: Run script
        working-directory: ./private
        run: |
          mkdir -p screenshots
          xvfb-run -a node renew.js

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots
          path: private/screenshots/*
